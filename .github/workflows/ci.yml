name: CI

# ------------------------------------------------------------
# WHEN does this workflow run?
# ------------------------------------------------------------
on:
  pull_request:
    # These PR events trigger CI:
    # - opened              -> new PR created
    # - synchronize         -> new commits pushed to PR branch
    # - reopened            -> closed PR reopened
    # - ready_for_review    -> draft PR marked ready
    types: [opened, synchronize, reopened, ready_for_review]


# ------------------------------------------------------------
# Concurrency Control
# ------------------------------------------------------------
# Cancel older in-flight runs and keep only the latest run per branch/PR.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


# ------------------------------------------------------------
# Security: Least Privilege
# ------------------------------------------------------------
permissions:
  contents: read

jobs:
  precommit:
    name: pre-commit (lint-staged/tests)
    runs-on: ubuntu-24.04

    steps:
      # ------------------------------------------------------
      # Step 1: Download the repository
      # ------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ------------------------------------------------------
      # Step 2: Install Node.js + enable npm cache
      # ------------------------------------------------------
      - name: Set up Node.js
        id: node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json

      # ------------------------------------------------------
      # Step 3: Install dependencies
      # ------------------------------------------------------
      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm ci --prefix backend

      # ------------------------------------------------------
      # Step 4: Run pre-commit checks
      # ------------------------------------------------------
      - name: Run pre-commit checks
        run: |
          git fetch --no-tags --depth=1 origin ${{ github.base_ref }}
          npx lint-staged --diff="origin/${{ github.base_ref }}...HEAD"
          npm test

      # ------------------------------------------------------
      # Step 5: Fail if hooks modified files
      # ------------------------------------------------------
      - name: Ensure no auto-fix changes remain
        run: git diff --exit-code